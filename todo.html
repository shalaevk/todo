<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
	<meta charset="UTF-8">
	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
	<title>TODO</title>
</head>
<body>
	<section class="tasks-wrap mt-5">
		<div class="container">
			<div class="alert notification-alert"></div>
			<div class="card mb-3">

				<div class="card-header">
					<h3 class="text-center">Добавить задачу</h3>
				</div>
				<div class="card-body">
					<form name='addTodoItem'>
						<div class="form-group">
							<label for="todoText"></label>
							<input type="text" class="form-control" id="todoText">
							<div class="invalid-feedback">
							Введите задачу
						</div>
						</div>
						
						<button type="submit" class="btn add-task btn-primary">Добавить</button>
					</form>
				</div>
			</div>
			<div class="card">
					<div class="card-header">
						<h3 class="text-center">Задачи</h3>
					</div>
				<div class="card-body">	
					<div class="alert alert-info alertEmpty"></div>
					<ul class="list-group ">
						
					</ul>
				<button class="btn btn-primary clear-btn mt-3">Clear list</button>
			</div>
		</div>
		
	</section>



	<script src="ajax.js"></script>
	<script src="js.js"></script>
	
</body>
</html>
